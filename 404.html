<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Não Encontrada | Imports Company</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/premium.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--navy-deep, #0a1128);
            /* Tema premium */
            color: #fff;
            text-align: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .error-code {
            font-size: 120px;
            font-weight: 700;
            font-family: 'Playfair Display', serif;
            color: var(--gold, #d4af37);
            margin: 0;
            line-height: 1;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
        }

        .error-title {
            font-size: 32px;
            margin: 10px 0 20px;
            font-weight: 500;
        }

        .error-desc {
            font-size: 16px;
            color: #ccc;
            margin-bottom: 40px;
            max-width: 500px;
            line-height: 1.6;
        }

        .btn-home {
            background: linear-gradient(135deg, var(--gold) 0%, #fdf5e6 50%, var(--gold) 100%);
            background-size: 200% auto;
            color: var(--navy-deep);
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.5);
            background-position: right center;
        }
    </style>
</head>

<body>
    <!-- Splash & Page Transition -->
    <script src="/splash-transition.js"></script>
    <h1 class="error-code">404</h1>
    <h2 class="error-title">Página não encontrada</h2>
    <p class="error-desc">Desculpe, a página ou produto que você está procurando não existe ou foi removido. Pode ter
        havido um erro de digitação no endereço ou o link expirou.</p>
    <a href="/" class="btn-home"><i class="fas fa-home"></i> Voltar à Loja</a>
</body>

</html>
