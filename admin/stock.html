<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque | Imports Co.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/css/admin.css">
    <style>
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #222535;
            --bg-hover: #2a2e3f;
            --border: #2e3347;
            --text-primary: #f0f0f5;
            --text-secondary: #8b8fa3;
            --accent: #6c5ce7;
            --accent-hover: #7d6ff0;
            --success: #00b894;
            --danger: #e74c3c;
            --warning: #f39c12;
            --gold: #c9a84c;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }

        .main { padding: 32px; margin-left: 250px; transition: margin 0.3s; }
        @media (max-width: 768px) { .main { margin-left: 60px; padding: 16px; } }

        .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .page-header h1 { font-size: 1.6rem; font-weight: 700; display: flex; align-items: center; gap: 12px; }

        .btn-plus {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
        }
        .btn-plus:hover { background: var(--accent-hover); transform: translateY(-2px); }

        /* SWITCH TOGGLE */
        .switch { position: relative; display: inline-block; width: 44px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* ACTION BUTTONS */
        .action-buttons { display: flex; gap: 6px; }
        .btn-action {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: var(--bg-hover);
            color: var(--text-primary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .btn-action:hover { background: var(--accent); border-color: var(--accent); color: white; }
        .btn-action.dec:hover { background: var(--danger); border-color: var(--danger); }

        /* MODAL STYLES */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: var(--bg-secondary);
            width: 500px;
            max-width: 90vw;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 6px; }
        .form-group input, .form-group select { width: 100%; padding: 10px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: white; }
        
        .badge-mini { font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; background: rgba(108, 92, 231, 0.2); color: var(--accent); font-weight: 600; }
        .badge-mini.secondary { background: rgba(201, 168, 76, 0.2); color: var(--gold); }
    </style>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-brand">
            <h2><i class="fas fa-crown"></i> <span>Imports Co.</span></h2>
        </div>
        <ul class="nav-menu">
            <li><a href="/admin/index.html"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></a></li>
            <li><a href="/admin/products.html"><i class="fas fa-box"></i> <span>Produtos</span></a></li>
            <li><a href="/admin/categories.html"><i class="fas fa-tags"></i> <span>Categorias</span></a></li>
            <li><a href="/admin/banners.html"><i class="fas fa-images"></i> <span>Banners</span></a></li>
            <li><a href="/admin/stock.html" class="active"><i class="fas fa-warehouse"></i> <span>Estoque</span></a></li>
            <li><a href="/admin/sales.html"><i class="fas fa-cash-register"></i> <span>Vendas</span></a></li>
            <li><a href="/admin/settings.html"><i class="fas fa-cog"></i> <span>Configurações</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <a href="/" target="_blank"><i class="fas fa-external-link-alt"></i> <span>Ver Loja</span></a>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt"></i> <span>Sair</span></a>
        </div>
    </aside>

    <main class="main">
        <div class="page-header">
            <h1><i class="fas fa-warehouse"></i> Controle de Estoque</h1>
            <button class="btn-plus" onclick="openNewProductModal()">
                <i class="fas fa-plus"></i> Novo Produto
            </button>
        </div>

        <!-- ESTATÍSTICAS -->
        <div class="stats-row">
            <div class="stat-box">
                <div class="label">Total de Peças</div>
                <div class="value ok" id="stat-total">-</div>
            </div>
            <div class="stat-box">
                <div class="label">Produtos</div>
                <div class="value" id="stat-products">-</div>
            </div>
            <div class="stat-box">
                <div class="label">Estoque Baixo</div>
                <div class="value warning" id="stat-low">-</div>
            </div>
            <div class="stat-box">
                <div class="label">Sem Estoque</div>
                <div class="value danger" id="stat-out">-</div>
            </div>
        </div>

        <!-- BUSCA -->
        <div class="search-bar">
            <input type="text" id="search" placeholder="Buscar produto..." oninput="renderStock()">
            <select id="filter" onchange="renderStock()">
                <option value="">Filtrar Status</option>
                <option value="ok">Em estoque</option>
                <option value="low">Estoque baixo</option>
                <option value="out">Sem estoque</option>
            </select>
        </div>

        <!-- TABELA -->
        <div id="stock-container">
            <div class="loading"><i class="fas fa-spinner fa-spin"></i> Carregando estoque...</div>
        </div>
    </main>

    <!-- QUICK PRODUCT MODAL -->
    <div class="modal-overlay" id="new-product-modal">
        <div class="modal">
            <div class="modal-header">
                <h2><i class="fas fa-plus-circle"></i> Novo Produto Rápido</h2>
                <button class="btn-action" onclick="closeNewProductModal()"><i class="fas fa-times"></i></button>
            </div>
            <form id="quick-product-form" onsubmit="saveQuickProduct(event)">
                <div class="modal-body">
                    <div class="form-group">
                        <label>Nome do Produto *</label>
                        <input type="text" id="f-name" required placeholder="Ex: Tênis Nike Air Force">
                    </div>
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div class="form-group">
                            <label>Categoria *</label>
                            <select id="f-category" required></select>
                        </div>
                        <div class="form-group">
                            <label>Preço (R$) *</label>
                            <input type="number" id="f-price" step="0.01" required placeholder="0.00">
                        </div>
                    </div>
                    <div class="form-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <div class="form-group">
                            <label>Estoque Inicial</label>
                            <input type="number" id="f-stock" value="0">
                        </div>
                        <div class="form-group" style="padding-top: 25px;">
                            <label class="switch" style="display: flex; align-items: center; gap: 10px; width: auto;">
                                <input type="checkbox" id="f-active-modal" checked>
                                <span class="slider round"></span>
                                <span style="font-size: 0.8rem; color: var(--text-secondary); margin-left: 50px;">Ativo no Site</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Foto do Produto (Local ou URL)</label>
                        <div style="display: flex; gap: 8px;">
                            <input type="text" id="f-image-url" placeholder="URL da imagem ou clique em upload" style="flex:1">
                            <input type="file" id="f-image-file" style="display:none" onchange="handleQuickUpload(this)">
                            <button type="button" class="btn-action" style="width: auto; padding: 0 15px;" onclick="document.getElementById('f-image-file').click()">
                                <i class="fas fa-upload"></i>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="padding: 16px 24px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 12px;">
                    <button type="button" class="btn btn-secondary" onclick="closeNewProductModal()" style="border:none; background:none; color: var(--text-secondary); cursor:pointer;">Cancelar</button>
                    <button type="submit" class="btn-plus">
                        <i class="fas fa-save"></i> Salvar Produto
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script src="js/stock.js"></script>
</body>

</html>
